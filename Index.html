<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Pitch para Comité de Crédito</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 800px;
            width: 100%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-weight: 700;
        }
        .subtitle {
            font-size: 1.1em;
            color: #7f8c8d;
            margin-bottom: 25px;
        }
        .controls-section {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .microphone-section {
            position: relative;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }
        .microphone-icon {
            font-size: 48px;
            color: #bdc3c7;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }
        .microphone-icon.recording {
            color: #e74c3c;
            transform: scale(1.1);
        }
        
        /* Visualizador de Nivel de Audio */
        .visualizer-container {
            width: 100%;
            height: 40px;
            background-color: #dfe6e9;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            margin-top: 10px;
        }
        #levelBar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            transition: width 0.1s ease;
        }
        .activity-dot {
            width: 12px;
            height: 12px;
            background-color: #bdc3c7;
            border-radius: 50%;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        .activity-dot.active {
            background-color: #2ecc71;
            box-shadow: 0 0 10px #2ecc71;
        }

        .button {
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
        }
        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #recordButton { background-color: #2ecc71; color: white; }
        #recordButton.recording { background-color: #e74c3c; }
        #pauseButton { background-color: #f39c12; color: white; }
        #analyzeButton { background-color: #3498db; color: white; }
        #playButton { background-color: #95a5a6; color: white; }
        #resetButton { background-color: #bdc3c7; color: white; }
        
        .hidden { display: none !important; }

        .analysis-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
            text-align: left;
        }
        .analysis-section h2 {
            color: #2980b9;
            margin-bottom: 20px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }
        .analysis-block {
            background-color: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .analysis-block p { margin: 0 0 10px 0; }
        .analysis-block p strong { color: #2c3e50; }

        .feedback-item {
            margin-bottom: 10px;
            padding: 12px;
            border-left-width: 4px;
            border-left-style: solid;
            border-radius: 5px;
            background-color: #f8f9f9;
        }
        .feedback-item.positive { border-color: #2ecc71; background-color: #d5f5e3; }
        .feedback-item.negative { border-color: #e74c3c; background-color: #fadedf; }
        .feedback-item.recommendation { border-color: #f39c12; background-color: #fef5e7; }
        
        .final-tip {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f6f3;
            border: 1px solid #d0ece7;
            border-left: 5px solid #1abc9c;
            border-radius: 8px;
            font-style: italic;
        }

        .grade {
            font-weight: bold;
            color: #e67e22;
            margin-top: 15px;
            font-size: 1.4em;
            text-align: center;
        }
        
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        audio { width: 100%; margin-top: 20px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Analizador de Pitch para Comité de Crédito</h1>
        <p class="subtitle">Graba tu presentación y recibe feedback inmediato.</p>

        <div class="microphone-section">
            <i id="microphoneIcon" class="fas fa-microphone microphone-icon"></i>
            <div id="recordingLabel" class="hidden" style="color: #e74c3c; font-weight: bold; margin-bottom: 5px;">Grabando...</div>
            <div class="visualizer-container" id="visualizerContainer">
                <div id="levelBar"></div>
            </div>
            <div id="activityDot" class="activity-dot"></div>
            <span id="activityText" style="font-size: 12px; color: #7f8c8d; margin-top: 5px;">Nivel de voz</span>
        </div>

        <div id="controlsSection" class="controls-section">
            <button id="recordButton" class="button">Grabar Pitch</button>
            <button id="pauseButton" class="button hidden">Pausar</button>
            <button id="playButton" class="button hidden">Reproducir</button>
            <button id="analyzeButton" class="button hidden">Analizar</button>
            <button id="resetButton" class="button hidden">Volver a Grabar</button>
        </div>
        
        <audio id="audioPlayback" controls class="hidden"></audio>

        <div id="analysisSection" class="analysis-section hidden">
            <div id="loader" class="loader hidden"></div>
            <div id="resultsContainer"></div>
        </div>
    </div>

    <script>
        // --- Elementos DOM ---
        const recordButton = document.getElementById('recordButton');
        const pauseButton = document.getElementById('pauseButton');
        const playButton = document.getElementById('playButton');
        const analyzeButton = document.getElementById('analyzeButton');
        const resetButton = document.getElementById('resetButton');
        const microphoneIcon = document.getElementById('microphoneIcon');
        const levelBar = document.getElementById('levelBar');
        const activityDot = document.getElementById('activityDot');
        const recordingLabel = document.getElementById('recordingLabel');
        const audioPlayback = document.getElementById('audioPlayback');
        const analysisSection = document.getElementById('analysisSection');
        const resultsContainer = document.getElementById('resultsContainer');
        const loader = document.getElementById('loader');

        // --- Estado ---
        let mediaRecorder;
        let audioChunks = [];
        let audioBlob;
        let recordingState = 'idle'; // idle, recording, paused, stopped, analyzing, finished
        
        let audioCtx;
        let analyser;
        let dataArray;
        let animationId;

        // --- Event Listeners ---
        recordButton.addEventListener('click', toggleRecording);
        pauseButton.addEventListener('click', togglePause);
        playButton.addEventListener('click', playRecording);
        analyzeButton.addEventListener('click', analyzePitch);
        resetButton.addEventListener('click', resetState);

        // --- Lógica del Indicador de Nivel (Vúmetro) ---
        async function startVisualizer(stream) {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);

                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                function updateLevel() {
                    if (recordingState !== 'recording' && recordingState !== 'paused') {
                        levelBar.style.width = '0%';
                        activityDot.classList.remove('active');
                        return;
                    }

                    analyser.getByteFrequencyData(dataArray);
                    
                    // Calculamos el volumen promedio
                    let sum = 0;
                    for(let i = 0; i < bufferLength; i++) {
                        sum += dataArray[i];
                    }
                    const average = sum / bufferLength;
                    
                    // Escalamos el valor para la barra (0-100%)
                    const level = Math.min(100, (average / 128) * 100);
                    
                    if (recordingState === 'recording') {
                        levelBar.style.width = level + '%';
                        // El punto se ilumina si hay sonido significativo
                        if (level > 5) {
                            activityDot.classList.add('active');
                        } else {
                            activityDot.classList.remove('active');
                        }
                    } else {
                        levelBar.style.width = '0%';
                        activityDot.classList.remove('active');
                    }

                    animationId = requestAnimationFrame(updateLevel);
                }

                updateLevel();
            } catch (err) {
                console.error("No se pudo iniciar el visualizador:", err);
            }
        }

        // --- Funciones Principales ---
        function updateUI() {
            recordButton.classList.toggle('recording', recordingState === 'recording');
            microphoneIcon.classList.toggle('recording', recordingState === 'recording');
            recordingLabel.classList.toggle('hidden', recordingState !== 'recording');
            
            recordButton.textContent = recordingState === 'recording' ? 'Detener' : 'Grabar Pitch';
            pauseButton.textContent = recordingState === 'paused' ? 'Reanudar' : 'Pausar';

            recordButton.classList.toggle('hidden', ['stopped', 'analyzing', 'finished'].includes(recordingState));
            pauseButton.classList.toggle('hidden', !['recording', 'paused'].includes(recordingState));
            playButton.classList.toggle('hidden', recordingState !== 'stopped');
            analyzeButton.classList.toggle('hidden', recordingState !== 'stopped');
            resetButton.classList.toggle('hidden', recordingState !== 'stopped' && recordingState !== 'finished');
            audioPlayback.classList.toggle('hidden', recordingState !== 'stopped');
            
            analysisSection.classList.toggle('hidden', !['analyzing', 'finished'].includes(recordingState));
        }

        async function toggleRecording() {
            if (recordingState === 'idle') {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioChunks = [];
                    mediaRecorder = new MediaRecorder(stream);
                    
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        audioPlayback.src = URL.createObjectURL(audioBlob);
                        recordingState = 'stopped';
                        updateUI();
                    };

                    recordingState = 'recording';
                    startVisualizer(stream);
                    mediaRecorder.start();
                    updateUI();
                } catch (err) {
                    alert('No se pudo acceder al micrófono. Por favor permite el acceso.');
                }
            } else {
                stopRecording();
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(t => t.stop());
            }
        }

        function togglePause() {
            if (recordingState === 'recording') {
                mediaRecorder.pause();
                recordingState = 'paused';
            } else if (recordingState === 'paused') {
                mediaRecorder.resume();
                recordingState = 'recording';
            }
            updateUI();
        }

        function playRecording() { audioPlayback.play(); }

        function resetState() {
            recordingState = 'idle';
            audioBlob = null;
            audioChunks = [];
            resultsContainer.innerHTML = '';
            if (animationId) cancelAnimationFrame(animationId);
            updateUI();
        }

        // --- Análisis IA ---
        async function analyzePitch() {
            if (!audioBlob) return;
            recordingState = 'analyzing';
            loader.classList.remove('hidden');
            resultsContainer.innerHTML = '';
            updateUI();

            try {
                const base64Audio = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(audioBlob);
                });

                const prompt = `
                    Actúa como un coach experto para analistas de crédito y un miembro senior de un comité de crédito bancario. Tu tarea es analizar una grabación de audio de un analista presentando un caso de crédito. El objetivo del pitch es obtener la aprobación para una solicitud de financiamiento. El pitch debe ser claro, conciso y directo, sin revelar información confidencial.

                    **TAREA:** Analiza el audio y devuelve un único objeto JSON estructurado.

                    **1. ANÁLISIS DE HABILIDADES DE PRESENTACIÓN Y ESTRUCTURA:** Evalúa meticulosamente:
                    * Tono y Energía: ¿Proyecta una voz firme? ¿Emana energía, convicción y aplomo al hablar?
                    * Claridad y Vocabulario: ¿El vocabulario es adecuado para un comité? ¿El nivel de detalle es el correcto (ni muy superficial ni excesivamente redundante)?
                    * Fluidez, Ritmo y Pausas: ¿El ritmo es adecuado y se habla con calma y sin ansiedad? ¿Se utilizan pausas adecuadas que denotan control del tema?
                    * Muletillas: Penaliza el uso de muletillas. Recomienda explícitamente sustituirlas por silencios.
                    * Profesionalismo, Autoridad y Seguridad: ¿Transmite absoluta confianza, conocimiento profundo del caso, autoridad y seguridad en sus argumentos?
                    * Estructura del Discurso: Evalúa estrictamente si el orden de la presentación fue lógico y ordenado: 1. Información cualitativa (cliente, actividad, relación con el banco), 2. Propuesta/Solicitud, 3. Situación financiera.

                    **2. ANÁLISIS DE CONTENIDO (CHECKLIST):** Verifica si el analista mencionó los siguientes puntos críticos. Si un punto es omitido, debes agregarlo como una recomendación. Para clientes actuales, la parte cualitativa puede ser más resumida. **NO se debe mencionar información confidencial como nombres de empresas, personas, clientes o proveedores.**

                    **A. Perfil Cualitativo General (sin información confidencial):**
                    * ¿Menciona si es cliente nuevo o actual?
                    * ¿Describe la estructura de gobierno corporativo (ej. si hay junta directiva, si es administración familiar)?
                    * ¿Menciona la antigüedad de la empresa?
                    * ¿Describe el modelo de negocio y los principales productos/servicios?
                    * ¿Realiza un análisis general de la competencia y el sector?

                    **B. La Solicitud:**
                    * Declaración clara de la solicitud (monto y tipo).
                    * Justificación de la necesidad del financiamiento.
                    * Negocios colaterales con el banco.

                    **C. Análisis Financiero:**
                    * **Estados Financieros:** ¿Son auditados? ¿Por quién?
                    * **Indicadores Clave:** Razón corriente, apalancamiento, período de cobro/pago, rotación de inventario.
                    * **Rentabilidad:** Análisis de ventas, margen bruto y operativo (explicando variaciones).
                    * **Flujo de Caja:** Monto del EBITDA, cobertura de la exposición total con EBITDA.
                    * **Capacidad de Pago:** Si no se menciona, la recomendación debe ser "mencionar la cobertura del servicio de la deuda o capacidad de pago".
                    * **Balance General:** Cobertura de la exposición con patrimonio.
                    * **Acreedores Bancarios:** Si en el balance se mencionan "documentos por pagar a bancos" o deudas similares, o si no se mencionan en absoluto, la recomendación debe ser "no olvidar detallar los acreedores bancarios tanto a corto como largo plazo en caso de que hayan".
                    * **Partidas Específicas:** ¿Explica cuentas grandes o inusuales (ej. cuentas con socios)?
                    * **Estado de Resultados:** ¿Menciona la política de dividendos y el pago de impuestos?

                    **3. MANEJO DE PREGUNTAS (Q&A):**
                    * ESCUCHA ATENTAMENTE si durante el audio alguien interrumpe o hace una pregunta al expositor.
                    * SI DETECTAS UNA PREGUNTA: Evalúa estrictamente la respuesta del analista. La respuesta DEBE ser directa, puntual, NO DEBE repetir la pregunta formulada y NO DEBE mencionar el nombre de la persona que preguntó.
                    * SI NO SE ESCUCHAN PREGUNTAS: Ignora este punto por completo y devuelve null.

                    **4. FORMATO DE SALIDA JSON:** Devuelve un objeto JSON con estas claves:
                    * "presentation_analysis": (Objeto) Con claves "tone", "clarity", "fluency", "filler_words", "persuasion", "structure". Cada una con un breve texto evaluativo basado en las directrices del punto 1.
                    * "content_checklist_feedback": (Array de strings) Lista de puntos OMITIDOS del checklist, fraseados como recomendación según las reglas anteriores.
                    * "qna_feedback": (String o null) Si hubo preguntas, incluye aquí tu evaluación de la respuesta (verificando que sea directa, sin repetir la pregunta y sin usar nombres). Si no hubo preguntas, este valor debe ser null.
                    * "strengths": (Array de strings) 2-3 puntos fuertes específicos (presentación y contenido).
                    * "areas_for_improvement": (Array de strings) 2-3 áreas de mejora críticas (presentación y contenido).
                    * "final_score": (Número) Puntuación global de 1 a 10.
                    * "final_recommendation": (String) Incluye esta frase exacta: "Recuerde, si le preguntan algo, no mencione el nombre de la persona ni repita la pregunta. Responda de forma concisa y directa."
                `;

                const apiKey = "AIzaSyAebVNjz6_8C4TA2sKE1doMrF8pGqMAH8M"; 
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: [{ text: prompt }, { inlineData: { mimeType: "audio/webm", data: base64Audio } }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) {
                    throw new Error(`Error de la API: ${response.status}`);
                }

                const result = await response.json();
                
                // Limpieza del formato JSON para evitar errores
                let responseText = result.candidates[0].content.parts[0].text;
                responseText = responseText.replace(/^```json\s*/i, '').replace(/\s*```$/i, '').trim();
                
                const data = JSON.parse(responseText);
                displayAnalysisResults(data);

            } catch (error) {
                console.error("Error durante el análisis de IA:", error);
                resultsContainer.innerHTML = `<div class="analysis-block"><p><strong>Error:</strong> No se pudo completar el análisis. Por favor, inténtalo de nuevo.</p><p style="color: grey; font-size: 0.9em;">${error.message}</p></div>`;
            } finally {
                recordingState = 'finished';
                loader.classList.add('hidden');
                updateUI();
            }
        }

        function displayAnalysisResults(data) {
            let html = '';

            // Presentation Skills Analysis
            if (data.presentation_analysis) {
                html += `<h2>Análisis de Habilidades de Presentación</h2><div class="analysis-block">`;
                html += `<p><strong>Tono y Energía:</strong> ${data.presentation_analysis.tone || 'N/A'}</p>`;
                html += `<p><strong>Claridad y Vocabulario:</strong> ${data.presentation_analysis.clarity || 'N/A'}</p>`;
                html += `<p><strong>Fluidez, Ritmo y Pausas:</strong> ${data.presentation_analysis.fluency || 'N/A'}</p>`;
                html += `<p><strong>Muletillas:</strong> ${data.presentation_analysis.filler_words || 'N/A'}</p>`;
                html += `<p><strong>Autoridad, Seguridad y Conocimiento:</strong> ${data.presentation_analysis.persuasion || 'N/A'}</p>`;
                html += `<p><strong>Estructura del Discurso:</strong> ${data.presentation_analysis.structure || 'N/A'}</p>`;
                html += `</div>`;
            }

            // Q&A Analysis (Conditional)
            if (data.qna_feedback) {
                html += `<h2>Manejo de Preguntas (Comité)</h2><div class="analysis-block">`;
                html += `<p><strong>Evaluación de Respuestas:</strong> ${data.qna_feedback}</p>`;
                html += `</div>`;
            }

            // Content Checklist Feedback
            if (data.content_checklist_feedback) {
                html += `<h2>Recomendaciones de Contenido</h2><div class="analysis-block">`;
                if (data.content_checklist_feedback.length > 0) {
                    data.content_checklist_feedback.forEach(item => {
                        html += `<div class="feedback-item recommendation">${item}</div>`;
                    });
                } else {
                    html += `<div class="feedback-item positive">¡Excelente trabajo! Has cubierto todos los puntos clave del contenido requerido.</div>`;
                }
                html += `</div>`;
            }
            
            // General Feedback
            html += `<h2>Retroalimentación General</h2><div class="analysis-block">`;
            if (data.strengths && data.strengths.length > 0) {
                html += `<strong>Puntos Fuertes:</strong>`;
                data.strengths.forEach(item => {
                    html += `<div class="feedback-item positive">${item}</div>`;
                });
            }
            if (data.areas_for_improvement && data.areas_for_improvement.length > 0) {
                html += `<strong style="margin-top: 15px; display: block;">Áreas de Mejora:</strong>`;
                data.areas_for_improvement.forEach(item => {
                    html += `<div class="feedback-item negative">${item}</div>`;
                });
            }
            html += `</div>`;

            // Final Score & Tip
            if (data.final_score) {
                html += `<div class="grade">Calificación Final: ${data.final_score}/10</div>`;
            }
            if (data.final_recommendation) {
                html += `<div class="final-tip">${data.final_recommendation}</div>`;
            }

            resultsContainer.innerHTML = html;
        }

        // --- Initial UI Setup ---
        resetState();
    </script>
</body>
</html>
